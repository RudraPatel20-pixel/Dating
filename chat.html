<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amoureux — Messages</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--rose:#ff6b9d;--blush:#ffb3c6;--peach:#ffcba4;--cream:#fff5f0;--deep:#1a0a0f;--wine:#7c2d4e;--silk:#ffe4ec;}
body{font-family:'Jost',sans-serif;background:var(--cream);height:100vh;overflow:hidden;cursor:none;}
.cursor{position:fixed;width:10px;height:10px;background:var(--rose);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:.1s;}
.cursor-ring{position:fixed;width:36px;height:36px;border:1.5px solid var(--rose);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .12s;opacity:.5;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,245,240,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,107,157,.08);}
.nav-inner{max-width:100%;padding:0 24px;height:66px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--wine);text-decoration:none;}
.nav-logo span{color:var(--rose);font-style:italic;}
.nav-right{display:flex;gap:8px;}
.nav-icon-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,107,157,.08);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;text-decoration:none;transition:.3s;}
.nav-icon-btn:hover{background:rgba(255,107,157,.15);}

/* CHAT LAYOUT */
.chat-layout{height:100vh;padding-top:66px;display:grid;grid-template-columns:340px 1fr;background:var(--cream);}

/* SIDEBAR */
.chat-sidebar{background:#fff;border-right:1px solid rgba(255,107,157,.08);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-header{padding:20px 20px 16px;border-bottom:1px solid rgba(255,107,157,.06);}
.sidebar-title{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--deep);margin-bottom:12px;}
.search-bar{position:relative;}
.search-input{width:100%;padding:10px 16px 10px 40px;border:1.5px solid rgba(255,107,157,.12);border-radius:12px;background:var(--cream);font-family:'Jost',sans-serif;font-size:13px;color:var(--deep);outline:none;transition:.3s;}
.search-input:focus{border-color:var(--rose);background:#fff;}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.4;}
.match-filters{display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid rgba(255,107,157,.06);overflow-x:auto;}
.mfilter{padding:6px 14px;border-radius:50px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:.3s;white-space:nowrap;border:none;font-family:'Jost',sans-serif;}
.mfilter.active{background:var(--rose);color:#fff;}
.mfilter:not(.active){background:rgba(255,107,157,.08);color:var(--wine);}
.conv-list{flex:1;overflow-y:auto;padding:8px;}
.conv-item{display:flex;align-items:center;gap:14px;padding:14px 12px;border-radius:16px;cursor:pointer;transition:.3s;position:relative;}
.conv-item:hover,.conv-item.active{background:rgba(255,107,157,.06);}
.conv-item.active{background:linear-gradient(135deg,rgba(255,107,157,.1),rgba(255,179,198,.06));}
.conv-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;position:relative;border:2px solid rgba(255,107,157,.15);}
.conv-online{width:13px;height:13px;background:#4ade80;border-radius:50%;border:2.5px solid #fff;position:absolute;bottom:0;right:0;}
.conv-body{flex:1;min-width:0;}
.conv-name{font-size:14px;font-weight:400;color:var(--deep);}
.conv-preview{font-size:12px;color:rgba(124,45,78,.5);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.conv-time{font-size:11px;color:rgba(124,45,78,.3);}
.conv-unread{background:var(--rose);color:#fff;border-radius:50px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;}

/* CHAT AREA */
.chat-area{display:flex;flex-direction:column;overflow:hidden;}

/* CHAT HEADER */
.chat-header{padding:16px 24px;background:#fff;border-bottom:1px solid rgba(255,107,157,.06);display:flex;align-items:center;gap:16px;}
.chat-user-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;background:linear-gradient(135deg,var(--rose),var(--peach));flex-shrink:0;position:relative;}
.chat-user-info{flex:1;}
.chat-user-name{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--deep);}
.chat-user-status{font-size:12px;color:#4ade80;display:flex;align-items:center;gap:4px;}
.chat-user-status::before{content:'';width:6px;height:6px;background:#4ade80;border-radius:50%;}
.chat-actions{display:flex;gap:8px;}
.chat-action-btn{width:38px;height:38px;border-radius:50%;background:rgba(255,107,157,.08);border:none;cursor:pointer;font-size:16px;transition:.3s;display:flex;align-items:center;justify-content:center;}
.chat-action-btn:hover{background:rgba(255,107,157,.15);}

/* MESSAGES */
.messages-area{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;background:radial-gradient(ellipse 100% 50% at 50% 100%,rgba(255,179,198,.08) 0%,transparent 70%),var(--cream);}
.msg-date-divider{text-align:center;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(124,45,78,.3);padding:8px 0;}
.msg-group{display:flex;gap:10px;align-items:flex-end;}
.msg-group.mine{flex-direction:row-reverse;}
.msg-avatar-sm{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--peach));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.msg-bubbles{display:flex;flex-direction:column;gap:4px;max-width:65%;}
.msg-group.mine .msg-bubbles{align-items:flex-end;}
.bubble{padding:12px 16px;border-radius:20px;font-size:14px;line-height:1.6;position:relative;word-break:break-word;}
.bubble.other{background:#fff;color:var(--deep);border-bottom-left-radius:4px;box-shadow:0 2px 12px rgba(255,107,157,.06);}
.bubble.mine{background:linear-gradient(135deg,var(--rose),var(--wine));color:#fff;border-bottom-right-radius:4px;box-shadow:0 4px 16px rgba(255,107,157,.25);}
.msg-time{font-size:10px;color:rgba(124,45,78,.3);padding:0 4px;margin-top:2px;}
.msg-group.mine .msg-time{text-align:right;}
.bubble-reaction{position:absolute;bottom:-8px;right:8px;background:#fff;border-radius:50px;padding:2px 6px;font-size:12px;box-shadow:0 2px 8px rgba(0,0,0,.1);}

/* TYPING INDICATOR */
.typing-indicator{display:flex;align-items:center;gap:10px;}
.typing-bubbles{display:flex;gap:4px;background:#fff;padding:12px 16px;border-radius:20px;border-bottom-left-radius:4px;}
.typing-dot{width:7px;height:7px;background:rgba(124,45,78,.3);border-radius:50%;animation:typingPulse 1.2s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes typingPulse{0%,100%{transform:translateY(0);opacity:.4;}50%{transform:translateY(-4px);opacity:1;}}

/* QUICK REPLIES */
.quick-replies{display:flex;gap:8px;padding:8px 24px;overflow-x:auto;}
.quick-reply{padding:8px 16px;border-radius:50px;background:#fff;border:1.5px solid rgba(255,107,157,.15);font-size:12px;color:var(--wine);cursor:pointer;white-space:nowrap;transition:.3s;font-family:'Jost',sans-serif;}
.quick-reply:hover{border-color:var(--rose);color:var(--rose);background:rgba(255,107,157,.04);}

/* INPUT AREA */
.chat-input-area{padding:16px 24px;background:#fff;border-top:1px solid rgba(255,107,157,.06);}
.input-wrap{display:flex;gap:12px;align-items:flex-end;background:var(--cream);border-radius:20px;padding:12px 16px;border:1.5px solid rgba(255,107,157,.12);transition:.3s;}
.input-wrap:focus-within{border-color:var(--rose);background:#fff;}
.emoji-btn,.attach-btn{background:none;border:none;cursor:pointer;font-size:20px;opacity:.5;transition:.3s;flex-shrink:0;}
.emoji-btn:hover,.attach-btn:hover{opacity:1;}
#msgInput{flex:1;border:none;background:none;font-family:'Jost',sans-serif;font-size:14px;color:var(--deep);resize:none;outline:none;max-height:120px;line-height:1.5;}
#msgInput::placeholder{color:rgba(124,45,78,.3);}
.send-btn{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--wine));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:.3s;flex-shrink:0;margin-bottom:-4px;}
.send-btn:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(255,107,157,.4);}

/* EMOJI PICKER */
.emoji-picker{display:none;position:absolute;bottom:90px;left:24px;background:#fff;border-radius:20px;padding:16px;box-shadow:0 16px 48px rgba(124,45,78,.15);border:1px solid rgba(255,107,157,.1);z-index:10;}
.emoji-picker.open{display:block;animation:popUp .3s ease;}
@keyframes popUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;}
.emoji-opt{font-size:20px;cursor:pointer;padding:6px;border-radius:8px;transition:.2s;text-align:center;}
.emoji-opt:hover{background:rgba(255,107,157,.08);}

/* EMPTY STATE */
.chat-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:48px;}
.chat-empty-heart{font-size:80px;margin-bottom:24px;animation:heartbeat 1.5s infinite;}
@keyframes heartbeat{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
.chat-empty h3{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--deep);margin-bottom:12px;}
.chat-empty p{font-size:14px;color:rgba(124,45,78,.5);line-height:1.7;}

@media(max-width:768px){
.chat-layout{grid-template-columns:1fr;}
.chat-sidebar{display:none;}
.chat-sidebar.show{display:flex;position:fixed;inset:66px 0 0;z-index:50;}
}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Amour<span>eux</span></a>
    <div class="nav-right">
      <a href="discover.html" class="nav-icon-btn">💘</a>
      <a href="notifications.html" class="nav-icon-btn">🔔</a>
      <a href="profile.html" class="nav-icon-btn">👤</a>
    </div>
  </div>
</nav>

<div class="chat-layout">
  <!-- SIDEBAR -->
  <div class="chat-sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Messages ♥</div>
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input class="search-input" placeholder="Search conversations...">
      </div>
    </div>
    <div class="match-filters">
      <button class="mfilter active">All</button>
      <button class="mfilter">Matches</button>
      <button class="mfilter">Unread</button>
      <button class="mfilter">Starred</button>
    </div>
    <div class="conv-list" id="convList">
      <!-- Conversations injected by JS -->
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chatArea">
    <div class="chat-empty" id="chatEmpty">
      <div class="chat-empty-heart">💕</div>
      <h3>Select a Conversation</h3>
      <p>Choose a match to start a beautiful conversation and write your love story together.</p>
    </div>

    <!-- Active Chat (hidden initially) -->
    <div id="activeChatUI" style="display:none;height:100%;display:none;flex-direction:column;">
      <div class="chat-header">
        <div class="chat-user-avatar" id="chatUserAvatar">🌸</div>
        <div class="chat-user-info">
          <div class="chat-user-name" id="chatUserName">Priya S.</div>
          <div class="chat-user-status" id="chatUserStatus">Online now</div>
        </div>
        <div class="chat-actions">
          <button class="chat-action-btn" title="Voice call">📞</button>
          <button class="chat-action-btn" title="Video call">📹</button>
          <button class="chat-action-btn" title="Profile">👤</button>
          <button class="chat-action-btn" onclick="reportUser()" title="Report">⋯</button>
        </div>
      </div>

      <div class="messages-area" id="messagesArea"></div>

      <div class="quick-replies">
        <button class="quick-reply" onclick="sendQuickReply(this)">👋 Hey there!</button>
        <button class="quick-reply" onclick="sendQuickReply(this)">☕ Coffee date?</button>
        <button class="quick-reply" onclick="sendQuickReply(this)">💬 Tell me more about yourself</button>
        <button class="quick-reply" onclick="sendQuickReply(this)">✈️ Favorite travel destination?</button>
        <button class="quick-reply" onclick="sendQuickReply(this)">😄 What makes you laugh?</button>
      </div>

      <div class="chat-input-area" style="position:relative;">
        <div class="emoji-picker" id="emojiPicker">
          <div class="emoji-grid" id="emojiGrid"></div>
        </div>
        <div class="input-wrap">
          <button class="emoji-btn" onclick="toggleEmoji()">😊</button>
          <textarea id="msgInput" rows="1" placeholder="Write something beautiful..." oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
          <button class="attach-btn">📎</button>
          <button class="send-btn" onclick="sendMessage()">♥</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const cursor=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
document.addEventListener('mousemove',e=>{cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px';setTimeout(()=>{ring.style.left=e.clientX+'px';ring.style.top=e.clientY+'px';},80);});

const conversations=[
  {id:0,name:'Ananya K.',avatar:'🌸',status:'Online',bg:'linear-gradient(135deg,#ffb3c6,#ff6b9d)',unread:3,preview:'Haha you\'re so funny 😂',time:'now',msgs:[
    {text:'Hey! So glad we matched 💕',mine:false,time:'10:32 AM'},
    {text:'Me too! You seem really interesting from your profile',mine:true,time:'10:33 AM'},
    {text:'I noticed you love hiking! Any recommendations near Mumbai?',mine:false,time:'10:35 AM'},
    {text:'Oh definitely! Matheran is gorgeous. Have you been?',mine:true,time:'10:36 AM'},
    {text:'Not yet! Would love to check it out sometime 🌿',mine:false,time:'10:37 AM'},
    {text:'Haha you\'re so funny 😂',mine:false,time:'10:40 AM'},
  ]},
  {id:1,name:'Meera S.',avatar:'🦋',status:'Last seen 2h ago',bg:'linear-gradient(135deg,#e879f9,#7c2d4e)',unread:0,preview:'That sounds amazing ✨',time:'2h',msgs:[
    {text:'Hi Meera! Love your travel photos',mine:true,time:'8:00 AM'},
    {text:'Thank you so much! Just got back from Goa 🌊',mine:false,time:'8:15 AM'},
    {text:'That sounds amazing ✨',mine:false,time:'8:16 AM'},
  ]},
  {id:2,name:'Riya P.',avatar:'🌺',status:'Last seen yesterday',bg:'linear-gradient(135deg,#ffcba4,#ff6b9d)',unread:1,preview:'Would you like to meet for coffee?',time:'1d',msgs:[
    {text:'I love that you listed cooking as an interest!',mine:false,time:'Yesterday 7:00 PM'},
    {text:'Yes! I love experimenting in the kitchen',mine:true,time:'Yesterday 7:05 PM'},
    {text:'Would you like to meet for coffee?',mine:false,time:'Yesterday 8:00 PM'},
  ]},
  {id:3,name:'Divya M.',avatar:'💫',status:'Online',bg:'linear-gradient(135deg,#38bdf8,#7c2d4e)',unread:0,preview:'See you Saturday! 💕',time:'3d',msgs:[
    {text:'Hi! We have so many things in common!',mine:false,time:'3 days ago'},
    {text:'I know right! Fitness, nature, coffee ☕',mine:true,time:'3 days ago'},
    {text:'See you Saturday! 💕',mine:false,time:'3 days ago'},
  ]},
];

let activeConv=null;

// Render conv list
function renderConvList(){
  const list=document.getElementById('convList');
  list.innerHTML=conversations.map((c,i)=>`
    <div class="conv-item${activeConv===i?' active':''}" onclick="openConv(${i})">
      <div class="conv-avatar" style="background:${c.bg}">${c.avatar}${c.status==='Online'?'<div class="conv-online"></div>':''}</div>
      <div class="conv-body">
        <div class="conv-name">${c.name}</div>
        <div class="conv-preview">${c.preview}</div>
      </div>
      <div class="conv-meta">
        <div class="conv-time">${c.time}</div>
        ${c.unread>0?`<div class="conv-unread">${c.unread}</div>`:''}
      </div>
    </div>
  `).join('');
}

function openConv(idx){
  activeConv=idx;
  const c=conversations[idx];
  c.unread=0;
  renderConvList();
  document.getElementById('chatEmpty').style.display='none';
  const ui=document.getElementById('activeChatUI');
  ui.style.display='flex';
  document.getElementById('chatUserAvatar').textContent=c.avatar;
  document.getElementById('chatUserAvatar').style.background=c.bg;
  document.getElementById('chatUserName').textContent=c.name;
  document.getElementById('chatUserStatus').textContent=c.status;
  renderMessages(c.msgs);
}

function renderMessages(msgs){
  const area=document.getElementById('messagesArea');
  area.innerHTML='<div class="msg-date-divider">Today</div>';
  msgs.forEach(m=>{
    const div=document.createElement('div');
    div.className='msg-group'+(m.mine?' mine':'');
    div.innerHTML=`
      ${!m.mine?`<div class="msg-avatar-sm">${conversations[activeConv].avatar}</div>`:''}
      <div class="msg-bubbles">
        <div class="bubble ${m.mine?'mine':'other'}">${m.text}</div>
        <div class="msg-time">${m.time}</div>
      </div>
    `;
    area.appendChild(div);
  });
  // Typing indicator
  if(conversations[activeConv].status==='Online'){
    const td=document.createElement('div');
    td.className='msg-group typing-indicator';
    td.innerHTML=`<div class="msg-avatar-sm">${conversations[activeConv].avatar}</div><div class="typing-bubbles"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
    td.id='typingInd';
    area.appendChild(td);
  }
  area.scrollTop=area.scrollHeight;
}

function sendMessage(){
  const input=document.getElementById('msgInput');
  const text=input.value.trim();
  if(!text||activeConv===null)return;
  const c=conversations[activeConv];
  const now=new Date();
  const timeStr=now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes()+' '+(now.getHours()<12?'AM':'PM');
  c.msgs.push({text,mine:true,time:timeStr});
  c.preview=text;
  c.time='now';
  input.value='';input.style.height='auto';
  renderMessages(c.msgs);
  renderConvList();
  // Simulate reply
  const ti=document.getElementById('typingInd');
  if(ti)ti.style.display='flex';
  const replies=['That\'s so sweet! 😊','Haha, totally agree!','Tell me more!','You\'re so funny 😂','I was just thinking the same thing! 💕','Aww you\'re cute 🥰'];
  setTimeout(()=>{
    const r=replies[Math.floor(Math.random()*replies.length)];
    c.msgs.push({text:r,mine:false,time:timeStr});
    c.preview=r;
    renderMessages(c.msgs);renderConvList();
  },1800);
}

function sendQuickReply(btn){
  document.getElementById('msgInput').value=btn.textContent;
  sendMessage();
}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(t){t.style.height='auto';t.style.height=Math.min(t.scrollHeight,120)+'px';}

// Emoji picker
const emojis=['😊','😍','🥰','💕','❤️','💗','😂','🌸','✨','🎉','👋','☕','🌿','🏔️','🎵','🍕','🌊','💫','🔥','😎','🥂','💐','🎁','🌺','🦋','✈️','🌙','⭐'];
const eg=document.getElementById('emojiGrid');
emojis.forEach(e=>{const d=document.createElement('div');d.className='emoji-opt';d.textContent=e;d.onclick=()=>{document.getElementById('msgInput').value+=e;toggleEmoji();};eg.appendChild(d);});
function toggleEmoji(){document.getElementById('emojiPicker').classList.toggle('open');}
document.addEventListener('click',e=>{if(!e.target.closest('.emoji-btn')&&!e.target.closest('.emoji-picker'))document.getElementById('emojiPicker').classList.remove('open');});

// Filter buttons
document.querySelectorAll('.mfilter').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.mfilter').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}));

function reportUser(){alert('Thank you for your concern. We take safety seriously. A report has been filed.');}

renderConvList();
openConv(0);
</script>
</body>
</html>
