<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amoureux — Notifications</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--rose:#ff6b9d;--cream:#fff5f0;--deep:#1a0a0f;--wine:#7c2d4e;--silk:#ffe4ec;}
body{font-family:'Jost',sans-serif;background:var(--cream);min-height:100vh;cursor:none;}
.cursor{position:fixed;width:10px;height:10px;background:var(--rose);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:.1s;}
.cursor-ring{position:fixed;width:36px;height:36px;border:1.5px solid var(--rose);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .12s;opacity:.5;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,245,240,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,107,157,.08);}
.nav-inner{max-width:700px;margin:0 auto;padding:0 24px;height:66px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--wine);text-decoration:none;}
.nav-logo span{color:var(--rose);font-style:italic;}
.back-btn{display:flex;align-items:center;gap:8px;color:var(--rose);text-decoration:none;font-size:13px;}
.page-wrap{max-width:700px;margin:0 auto;padding:90px 24px 60px;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;color:var(--deep);margin-bottom:8px;}
.page-sub{font-size:13px;color:rgba(124,45,78,.5);margin-bottom:32px;}
.notif-tabs{display:flex;gap:4px;background:rgba(255,107,157,.06);border-radius:14px;padding:4px;margin-bottom:28px;}
.ntab{flex:1;padding:10px;border:none;background:none;border-radius:10px;font-family:'Jost',sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;color:var(--wine);opacity:.5;transition:.3s;position:relative;}
.ntab.active{background:#fff;opacity:1;color:var(--rose);box-shadow:0 2px 12px rgba(255,107,157,.1);}
.ntab-count{background:var(--rose);color:#fff;border-radius:50px;padding:1px 6px;font-size:9px;margin-left:4px;}
.notif-list{display:flex;flex-direction:column;gap:12px;}
.notif-card{background:#fff;border-radius:20px;padding:20px;border:1px solid rgba(255,107,157,.08);display:flex;align-items:center;gap:16px;transition:.3s;cursor:pointer;position:relative;overflow:hidden;}
.notif-card:hover{border-color:rgba(255,107,157,.2);transform:translateX(4px);box-shadow:0 8px 24px rgba(255,107,157,.08);}
.notif-card.unread::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--rose);border-radius:3px 0 0 3px;}
.notif-icon{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;position:relative;}
.notif-icon-badge{position:absolute;bottom:-2px;right:-2px;width:20px;height:20px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:10px;}
.notif-body{flex:1;min-width:0;}
.notif-text{font-size:14px;color:var(--deep);line-height:1.5;}
.notif-text strong{font-weight:500;color:var(--wine);}
.notif-time{font-size:11px;color:rgba(124,45,78,.3);margin-top:4px;}
.notif-action{flex-shrink:0;}
.notif-btn{padding:8px 18px;border-radius:50px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;border:none;cursor:pointer;font-family:'Jost',sans-serif;transition:.3s;}
.notif-btn.accept{background:linear-gradient(135deg,var(--rose),var(--wine));color:#fff;}
.notif-btn.accept:hover{box-shadow:0 4px 16px rgba(255,107,157,.3);}
.notif-btn.view{background:rgba(255,107,157,.08);color:var(--rose);}
.notif-btn.view:hover{background:rgba(255,107,157,.15);}
.notif-avatar{background:linear-gradient(135deg,#ffb3c6,#ff6b9d);}
.notif-match{background:linear-gradient(135deg,#ff6b9d,#7c2d4e);}
.notif-msg{background:linear-gradient(135deg,#38bdf8,#7c2d4e);}
.notif-like{background:linear-gradient(135deg,#fbbf24,#f59e0b);}
.notif-safe{background:linear-gradient(135deg,#4ade80,#16a34a);}
.notif-sys{background:linear-gradient(135deg,#a78bfa,#7c3aed);}
.empty-state{text-align:center;padding:80px 24px;}
.empty-state div{font-size:60px;margin-bottom:16px;}
.empty-state h3{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--deep);margin-bottom:8px;}
.empty-state p{font-size:13px;color:rgba(124,45,78,.5);}
.mark-all{display:flex;justify-content:flex-end;margin-bottom:12px;}
.mark-all-btn{background:none;border:none;font-family:'Jost',sans-serif;font-size:12px;color:var(--rose);cursor:pointer;letter-spacing:1px;}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<nav><div class="nav-inner">
  <a href="index.html" class="nav-logo">Amour<span>eux</span></a>
  <a href="discover.html" class="back-btn">← Back to Discover</a>
</div></nav>

<div class="page-wrap">
  <h1 class="page-title">Notifications ♥</h1>
  <p class="page-sub">Stay updated on your love journey</p>
  <div class="notif-tabs">
    <button class="ntab active" onclick="filterNotifs('all',this)">All <span class="ntab-count">8</span></button>
    <button class="ntab" onclick="filterNotifs('matches',this)">Matches <span class="ntab-count">3</span></button>
    <button class="ntab" onclick="filterNotifs('messages',this)">Messages <span class="ntab-count">4</span></button>
    <button class="ntab" onclick="filterNotifs('likes',this)">Likes <span class="ntab-count">1</span></button>
  </div>
  <div class="mark-all"><button class="mark-all-btn" onclick="markAllRead()">Mark all as read</button></div>
  <div class="notif-list" id="notifList"></div>
</div>

<script>
const cursor=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
document.addEventListener('mousemove',e=>{cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px';setTimeout(()=>{ring.style.left=e.clientX+'px';ring.style.top=e.clientY+'px';},80);});

const notifications=[
  {type:'matches',icon:'🌸',iconClass:'notif-match',badge:'♥',badgeBg:'var(--rose)',text:'<strong>You and Ananya K.</strong> have matched! Start a conversation now.',time:'Just now',unread:true,action:{label:'Message',class:'accept',fn:"window.location.href='chat.html'"}},
  {type:'messages',icon:'🦋',iconClass:'notif-msg',badge:'💬',badgeBg:'#38bdf8',text:'<strong>Meera S.</strong> sent you a new message: "That sounds amazing ✨"',time:'5 minutes ago',unread:true,action:{label:'Reply',class:'accept',fn:"window.location.href='chat.html'"}},
  {type:'matches',icon:'🌺',iconClass:'notif-match',badge:'♥',badgeBg:'var(--rose)',text:'<strong>Riya P.</strong> liked you back — it\'s a match! 💕',time:'32 minutes ago',unread:true,action:{label:'View Match',class:'accept',fn:"window.location.href='chat.html'"}},
  {type:'likes',icon:'💫',iconClass:'notif-like',badge:'⭐',badgeBg:'#fbbf24',text:'<strong>Someone</strong> super liked your profile! Upgrade to see who.',time:'1 hour ago',unread:true,action:{label:'View',class:'view',fn:"alert('Upgrade to Premium to see who super liked you!')"}},
  {type:'messages',icon:'🌺',iconClass:'notif-msg',badge:'💬',badgeBg:'#38bdf8',text:'<strong>Riya P.</strong> asked: "Would you like to meet for coffee?"',time:'2 hours ago',unread:false,action:{label:'Reply',class:'view',fn:"window.location.href='chat.html'"}},
  {type:'matches',icon:'💐',iconClass:'notif-match',badge:'♥',badgeBg:'var(--rose)',text:'<strong>Divya M.</strong> matched with you 3 days ago. Don\'t leave her waiting!',time:'3 days ago',unread:false,action:{label:'Message',class:'view',fn:"window.location.href='chat.html'"}},
  {type:'messages',icon:'🌸',iconClass:'notif-msg',badge:'💬',badgeBg:'#38bdf8',text:'<strong>Ananya K.</strong> sent 3 new messages while you were away.',time:'4 days ago',unread:false,action:{label:'View',class:'view',fn:"window.location.href='chat.html'"}},
  {type:'messages',icon:'✨',iconClass:'notif-sys',badge:'🎉',badgeBg:'#a78bfa',text:'<strong>Weekly Digest:</strong> You have 12 new profile views and 5 likes this week!',time:'5 days ago',unread:false,action:{label:'View Stats',class:'view',fn:"window.location.href='profile.html'"}},
];

let activeFilter='all';
function filterNotifs(type,btn){
  activeFilter=type;
  document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderNotifs();
}
function renderNotifs(){
  const list=document.getElementById('notifList');
  const filtered=activeFilter==='all'?notifications:notifications.filter(n=>n.type===activeFilter);
  if(!filtered.length){list.innerHTML=`<div class="empty-state"><div>💌</div><h3>All Caught Up!</h3><p>No notifications in this category yet.</p></div>`;return;}
  list.innerHTML=filtered.map((n,i)=>`
    <div class="notif-card${n.unread?' unread':''}" id="notif${i}">
      <div class="notif-icon ${n.iconClass}">${n.icon}
        <div class="notif-icon-badge" style="background:${n.badgeBg}">${n.badge}</div>
      </div>
      <div class="notif-body">
        <div class="notif-text">${n.text}</div>
        <div class="notif-time">${n.time}</div>
      </div>
      <div class="notif-action">
        <button class="notif-btn ${n.action.class}" onclick="${n.action.fn}">${n.action.label}</button>
      </div>
    </div>
  `).join('');
  // Entrance animation
  document.querySelectorAll('.notif-card').forEach((c,i)=>{
    c.style.opacity='0';c.style.transform='translateY(20px)';
    setTimeout(()=>{c.style.transition='all .4s ease';c.style.opacity='1';c.style.transform='none';},i*60);
  });
}
function markAllRead(){
  notifications.forEach(n=>n.unread=false);
  document.querySelectorAll('.notif-card').forEach(c=>c.classList.remove('unread'));
  document.querySelectorAll('.ntab-count').forEach(c=>c.textContent='0');
}
renderNotifs();
</script>
</body>
</html>
